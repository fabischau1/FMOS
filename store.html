<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FMOS Store</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            background-color: #1e1e1e;
            padding: 1em;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        h1 {
            margin: 0;
            font-size: 2em;
        }

        main {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 1em;
        }

        .app-card {
            background-color: #1e1e1e;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 1em;
            margin: 1em;
            width: 300px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .app-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.4);
        }

        button {
            background-color: #6200ea;
            color: #ffffff;
            border: none;
            border-radius: 5px;
            padding: 0.5em 1em;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #3700b3;
        }
    </style>
</head>
<body>
    <header>
        <h1>FMOS Store</h1>
    </header>
    <main>
        <div class="app-card">
            <h2>FMOS Notes</h2>
            <p>Creator: fabischau</p>
            <p>Features: Can write and save notes</p>
			<p>App</p>
            <button onclick="install('https://fabischau1.github.io/FMOS/Apps/note.fexe')">Install</button>
        </div>
        <div class="app-card">
            <h2>App Name 2</h2>
            <p>Creator: Hersteller 2</p>
            <p>Features: Feature A, Feature B, Feature C</p>
            <button onclick="install('https://fabischau1.github.io/FMOS/Apps/')">Install</button>
        </div>
        <!-- Weitere Apps können hier hinzugefügt werden -->
    </main>
    <script>
        function installApp(url) {
            window.location.href = url;
        }
    </script>
</body>
</html>

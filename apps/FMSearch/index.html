<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FM Search</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: Arial, sans-serif;
            background-color: #111;
            position: relative;
        }

        .container {
            width: 500px;
            text-align: center;
            backdrop-filter: blur(10px);
            background-color: rgba(50, 50, 50, 0.6);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 10;
            animation: fadeIn 1s ease-in-out;
        }

        h1 {
            color: #00ffcc;
            font-size: 2.5rem;
            margin-bottom: 20px;
            animation: neonGlow 1s ease-in-out infinite alternate;
        }

        @keyframes neonGlow {
            0% { text-shadow: 0 0 5px #00ffcc, 0 0 10px #00ffcc, 0 0 15px #00ffcc, 0 0 20px #00ffcc; }
            100% { text-shadow: 0 0 10px #00ffcc, 0 0 20px #00ffcc, 0 0 30px #00ffcc, 0 0 40px #00ffcc; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .input-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            padding: 10px;
            width: 300px;
            border: none;
            border-radius: 5px;
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
            outline: none;
            transition: all 0.3s ease;
            transform: scale(1);
        }

        input[type="text"]:focus {
            background-color: rgba(255, 255, 255, 0.4);
            box-shadow: 0 0 10px #00ffcc;
            transform: scale(1.05);
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            background-color: #00ffcc;
            color: black;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            transform: scale(1);
        }

        button:hover {
            background-color: #00bfa5;
            transform: scale(1.1);
            box-shadow: 0 0 10px #00ffcc;
        }

        .favorites {
            margin-top: 20px;
            text-align: left;
            animation: fadeIn 1.2s ease-in-out;
        }

        .favorite-item {
            color: #00ffcc;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-size: 1rem;
            opacity: 0;
            transform: translateX(-20px);
            animation: slideIn 0.5s forwards;
        }

        .favorite-item:nth-child(even) {
            animation-delay: 0.1s;
        }

        .favorite-item:nth-child(odd) {
            animation-delay: 0.2s;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .remove-btn {
            color: #ff3333;
            cursor: pointer;
            margin-left: 10px;
            font-size: 0.9rem;
            transition: color 0.3s ease, transform 0.3s;
        }

        .remove-btn:hover {
            color: #ff6666;
            transform: scale(1.1);
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .color-menu {
            position: absolute;
            top: 20px;
            right: 20px;
            background: linear-gradient(145deg, #3e3e3e, #2a2a2a);
            padding: 15px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            box-shadow: 5px 5px 20px rgba(0, 0, 0, 0.5),
                        -5px -5px 20px rgba(255, 255, 255, 0.1);
            z-index: 20;
        }

        select {
            padding: 10px;
            border-radius: 5px;
            border: none;
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.3s;
            font-size: 1rem;
        }

        select:hover {
            background-color: rgba(255, 255, 255, 0.4);
            transform: scale(1.05);
        }

        .color-menu label {
            color: #00ffcc;
            font-size: 1rem;
            margin-right: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>FM Search</h1>

        <div class="input-group">
            <input type="text" id="visitUrlInput" placeholder="Enter URL to visit..." autofocus>
            <button id="visitUrlBtn">Visit</button>
        </div>

        <div class="input-group">
            <input type="text" id="saveUrlInput" placeholder="Enter URL to save as favorite...">
            <button id="saveUrlBtn">Save Favorite</button>
        </div>

        <div class="favorites" id="favoritesList"></div>
    </div>

    <canvas id="trailCanvas"></canvas>

    <div class="color-menu" id="colorMenu">
        <label for="colorSelect">Choose a color:</label>
        <select id="colorSelect">
            <option value="#00ffcc">Cyan</option>
            <option value="#00008B">Dark Blue</option>
            <option value="#800080">Purple</option>
            <option value="#00FF00">Lime</option>
            <option value="#006400">Dark Green</option>
            <option value="#FFC0CB">Pink</option>
            <option value="#FF00FF">Magenta</option>
            <option value="#FF0000">Red</option>
        </select>
    </div>

    <script>
        const visitUrlInput = document.getElementById('visitUrlInput');
        const saveUrlInput = document.getElementById('saveUrlInput');
        const visitUrlBtn = document.getElementById('visitUrlBtn');
        const saveUrlBtn = document.getElementById('saveUrlBtn');
        const favoritesList = document.getElementById('favoritesList');
        const canvas = document.getElementById('trailCanvas');
        const ctx = canvas.getContext('2d');
        const colorSelect = document.getElementById('colorSelect');
        const storageKey = 'FMSearchFavorites';
        const colorStorageKey = 'FMSearchColor';

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let mouseX = 0;
        let mouseY = 0;
        const trails = [];

        function loadColors() {
            const storedColors = JSON.parse(localStorage.getItem(colorStorageKey));
            const selectedColor = storedColors?.buttonColor || '#00ffcc';
            colorSelect.value = selectedColor;
            updateColors(selectedColor);
            updateTrailColor(selectedColor);
        }

        function updateColors(color) {
            document.querySelector('h1').style.color = color;
            document.querySelectorAll('button').forEach(btn => {
                btn.style.backgroundColor = color;
            });
        }

        function updateTrailColor(color) {
            ctx.strokeStyle = color;
            ctx.shadowColor = color;
        }

        colorSelect.addEventListener('change', () => {
            const selectedColor = colorSelect.value;
            const colors = {
                buttonColor: selectedColor,
                textColor: selectedColor
            };
            localStorage.setItem(colorStorageKey, JSON.stringify(colors));
            updateColors(selectedColor);
            updateTrailColor(selectedColor);
            updateFavoritesColor(selectedColor);
        });

        function updateFavoritesColor(color) {
            const favoriteItems = document.querySelectorAll('.favorite-item');
            favoriteItems.forEach(item => {
                item.style.color = color;
            });
        }

        function visitUrl() {
            const url = visitUrlInput.value.trim();
            if (url.startsWith('https://')) {
                window.location.href = url;
            } else {
                alert('Only HTTPS URLs are allowed. Please enter a valid HTTPS URL.');
            }
        }

        function saveFavoriteUrl() {
            const url = saveUrlInput.value.trim();
            if (url.startsWith('https://')) {
                const favorites = JSON.parse(localStorage.getItem(storageKey)) || [];
                favorites.push(url);
                localStorage.setItem(storageKey, JSON.stringify(favorites));
                displayFavorites();
                saveUrlInput.value = '';
            } else {
                alert('Only HTTPS URLs are allowed. Please enter a valid HTTPS URL.');
            }
        }

        function displayFavorites() {
            favoritesList.innerHTML = '';
            const favorites = JSON.parse(localStorage.getItem(storageKey)) || [];
            favorites.forEach((url, index) => {
                const item = document.createElement('div');
                item.classList.add('favorite-item');
                item.innerHTML = `<span onclick="window.location.href='${url}'">${url}</span>
                                  <span class="remove-btn" onclick="removeFavorite(${index})">Remove</span>`;
                favoritesList.appendChild(item);
            });
            updateFavoritesColor(colorSelect.value);
        }

        function removeFavorite(index) {
            const favorites = JSON.parse(localStorage.getItem(storageKey)) || [];
            favorites.splice(index, 1);
            localStorage.setItem(storageKey, JSON.stringify(favorites));
            displayFavorites();
        }

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            trails.push({ x: mouseX, y: mouseY, alpha: 1 });
            if (trails.length > 50) trails.shift();
        });

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.beginPath();
            ctx.moveTo(trails[0]?.x || mouseX, trails[0]?.y || mouseY);
            trails.forEach((trail, index) => {
                ctx.lineWidth = 4;
                ctx.strokeStyle = ctx.strokeStyle;
                ctx.shadowColor = ctx.shadowColor;
                ctx.shadowBlur = 15;
                ctx.lineJoin = 'round';
                ctx.lineCap = 'round';
                ctx.lineTo(trail.x, trail.y);
                trail.alpha -= 0.02;
                if (trail.alpha <= 0) trails.splice(index, 1);
            });
            ctx.stroke();
            requestAnimationFrame(animate);
        }

        visitUrlBtn.addEventListener('click', visitUrl);
        saveUrlBtn.addEventListener('click', saveFavoriteUrl);
        displayFavorites();
        loadColors();
        animate();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
